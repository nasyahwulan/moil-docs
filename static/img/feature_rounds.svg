<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Graph axes -->
  <line x1="30" y1="130" x2="180" y2="130" stroke="#1F5F3F" stroke-width="1.5" />
  <line x1="30" y1="20" x2="30" y2="130" stroke="#1F5F3F" stroke-width="1.5" />
  <!-- X axis arrow -->
  <polyline points="175,126 180,130 175,134" fill="none" stroke="#1F5F3F" stroke-width="1.5" />
  <!-- Y axis arrow -->
  <polyline points="26,25 30,20 34,25" fill="none" stroke="#1F5F3F" stroke-width="1.5" />
  <!-- Multi-round data points (10 rounds with different colors representing aggregation curve) -->
  <g>
    <circle cx="45"  cy="100" r="3.5" fill="#2E8B57" stroke="none" />
    <circle cx="60"  cy="85"  r="3.5" fill="#3A9D6B" stroke="none" />
    <circle cx="75"  cy="72"  r="3.5" fill="#46AF7F" stroke="none" />
    <circle cx="90"  cy="60"  r="3.5" fill="#52C193" stroke="none" />
    <circle cx="105" cy="55"  r="3.5" fill="#52C193" stroke="none" />
    <circle cx="120" cy="60"  r="3.5" fill="#46AF7F" stroke="none" />
    <circle cx="135" cy="72"  r="3.5" fill="#3A9D6B" stroke="none" />
    <circle cx="150" cy="85"  r="3.5" fill="#2E8B57" stroke="none" />
    <circle cx="165" cy="100" r="3.5" fill="#1F5F3F" stroke="none" />
  </g>
  <!-- Aggregation curve -->
  <path d="M 45 100 Q 60 85 75 72 T 105 55 T 135 72 T 165 100"
        fill="none" stroke="#2E8B57" stroke-width="2" opacity="0.7" />
  <!-- Minimum marker -->
  <circle cx="105" cy="55" r="7" fill="none" stroke="#1F5F3F" stroke-width="2" />
  <line x1="105" y1="55" x2="105" y2="130" stroke="#1F5F3F" stroke-width="1" stroke-dasharray="2,2" opacity="0.5" />
  <!-- Labels -->
  <text x="180" y="143" font-family="sans-serif" font-size="8" fill="#1F5F3F" text-anchor="end">Distance</text>
  <text x="36" y="20" font-family="sans-serif" font-size="8" fill="#1F5F3F">Aggregation</text>
</svg>
