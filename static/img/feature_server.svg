<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Server box (left) -->
  <g transform="translate(20,40)">
    <rect x="0" y="0" width="55" height="80" rx="4" fill="#E8F5EE" stroke="#2E8B57" />
    <!-- Server LEDs / ports -->
    <circle cx="10" cy="12" r="2" fill="#2E8B57" stroke="none" />
    <circle cx="18" cy="12" r="2" fill="#52C193" stroke="none" />
    <line x1="8" y1="25" x2="47" y2="25" stroke="#2E8B57" stroke-width="1" />
    <line x1="8" y1="33" x2="47" y2="33" stroke="#2E8B57" stroke-width="1" />
    <line x1="8" y1="41" x2="47" y2="41" stroke="#2E8B57" stroke-width="1" />
    <!-- Port labels -->
    <text x="27" y="56" font-family="monospace" font-size="6" fill="#1F5F3F" text-anchor="middle">8000</text>
    <text x="27" y="65" font-family="monospace" font-size="6" fill="#1F5F3F" text-anchor="middle">8001</text>
    <text x="27" y="74" font-family="monospace" font-size="6" fill="#1F5F3F" text-anchor="middle">8002</text>
  </g>
  <text x="47" y="138" font-family="sans-serif" font-size="8" fill="#1F5F3F" text-anchor="middle" font-weight="bold">Server</text>
  <!-- Network arrows (HTTP) -->
  <g stroke="#2E8B57" stroke-width="1.5">
    <line x1="80" y1="65" x2="120" y2="65" stroke-dasharray="4,2" />
    <polyline points="116,61 120,65 116,69" fill="none" />
    <line x1="120" y1="95" x2="80" y2="95" stroke-dasharray="4,2" />
    <polyline points="84,91 80,95 84,99" fill="none" />
  </g>
  <text x="100" y="58" font-family="monospace" font-size="7" fill="#1F5F3F" text-anchor="middle">HTTP</text>
  <text x="100" y="108" font-family="monospace" font-size="7" fill="#1F5F3F" text-anchor="middle">REST</text>
  <!-- Client box (right) -->
  <g transform="translate(125,40)">
    <rect x="0" y="0" width="55" height="80" rx="4" fill="#E8F5EE" stroke="#2E8B57" />
    <!-- Screen -->
    <rect x="6" y="8" width="43" height="30" rx="2" fill="#FFFFFF" stroke="#2E8B57" stroke-width="1" />
    <!-- App content lines -->
    <line x1="10" y1="16" x2="35" y2="16" stroke="#2E8B57" stroke-width="1" />
    <line x1="10" y1="22" x2="40" y2="22" stroke="#2E8B57" stroke-width="1" />
    <line x1="10" y1="28" x2="32" y2="28" stroke="#2E8B57" stroke-width="1" />
    <!-- Keyboard area -->
    <rect x="6" y="45" width="43" height="25" rx="1" fill="#FFFFFF" stroke="#2E8B57" stroke-width="1" />
    <line x1="12" y1="52" x2="43" y2="52" stroke="#2E8B57" stroke-width="0.8" />
    <line x1="12" y1="58" x2="43" y2="58" stroke="#2E8B57" stroke-width="0.8" />
    <line x1="12" y1="64" x2="43" y2="64" stroke="#2E8B57" stroke-width="0.8" />
  </g>
  <text x="152" y="138" font-family="sans-serif" font-size="8" fill="#1F5F3F" text-anchor="middle" font-weight="bold">Client</text>
</svg>
