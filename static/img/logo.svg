<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring (fisheye lens body) -->
  <circle cx="100" cy="100" r="92" fill="#2E8B57" stroke="#1F5F3F" stroke-width="4"/>

  <!-- Inner ring (lens edge) -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#1F5F3F" stroke-width="2"/>

  <!-- Concentric calibration rings -->
  <g fill="none" stroke="#FFFFFF" stroke-width="2.5">
    <circle cx="100" cy="100" r="65"/>
    <circle cx="100" cy="100" r="52"/>
    <circle cx="100" cy="100" r="39"/>
    <circle cx="100" cy="100" r="26"/>
    <circle cx="100" cy="100" r="13"/>
  </g>

  <!-- Central blob (principal point marker) -->
  <circle cx="100" cy="100" r="6" fill="#FFFFFF"/>
  <circle cx="100" cy="100" r="2.5" fill="#1F5F3F"/>

  <!-- Crosshair (optical axis indicators) -->
  <g stroke="#FFFFFF" stroke-width="1.5" opacity="0.7">
    <line x1="100" y1="22" x2="100" y2="35"/>
    <line x1="100" y1="165" x2="100" y2="178"/>
    <line x1="22" y1="100" x2="35" y2="100"/>
    <line x1="165" y1="100" x2="178" y2="100"/>
  </g>
</svg>
